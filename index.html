<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembukuan Kebab Kebut</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Pembukuan Kebab Kebut</h1>

  <!-- TANGGAL -->
  <div class="section">
    <label for="tanggal">Tanggal</label>
    <input type="date" id="tanggal">
  </div>

  <!-- STOK HARIAN -->
  <div class="section">
    <h2>Stok Harian</h2>
    <table>
      <thead>
        <tr>
          <th>Barang</th>
          <th>Sisa Awal</th>
          <th>Masuk</th>
          <th>Jumlah</th>
          <th>Pakai</th>
          <th>Rusak</th>
          <th>Sisa Akhir</th>
        </tr>
      </thead>
      <tbody id="stok-harian"></tbody>
    </table>
  </div>

  <!-- STOK GEROBAK -->
  <div class="section">
    <h2>Stok Gerobak</h2>
    <table>
      <thead>
        <tr>
          <th>Barang</th>
          <th>Sisa Awal</th>
          <th>Masuk</th>
          <th>Jumlah</th>
          <th>Pakai</th>
          <th>Rusak</th>
          <th>Sisa Akhir</th>
        </tr>
      </thead>
      <tbody id="stok-gerobak"></tbody>
    </table>
  </div>

  <!-- PENJUALAN -->
  <div class="section">
    <h2>Penjualan</h2>
    <table>
      <thead>
        <tr>
          <th>Menu</th>
          <th>Harga</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="penjualan"></tbody>
    </table>

    <h3>Total Penjualan: Rp <span id="total-penjualan">0</span></h3>
  </div>

  <!-- KEUANGAN BARU -->
  <div class="section">
    <h2>Keuangan</h2>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Jumlah</th>
        </tr>
      </thead>
      <tbody>

        <tr>
          <td>Bonus</td>
          <td>
            <input type="number" id="bonus" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>Shopee</td>
          <td>
            <input type="number" id="shopee" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>QRIS</td>
          <td>
            <input type="number" id="qris" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>
            <input type="text" id="ket_pengeluaran1" placeholder="Contoh: Gas LPG">
          </td>
          <td>
            <input type="number" id="pengeluaran1" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>
            <input type="text" id="ket_pengeluaran2" placeholder="Contoh: Saus">
          </td>
          <td>
            <input type="number" id="pengeluaran2" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>
            <input type="text" id="ket_pengeluaran3" placeholder="Contoh: Minyak">
          </td>
          <td>
            <input type="number" id="pengeluaran3" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>
            <input type="text" id="ket_pengeluaran4" placeholder="Pengeluaran lainnya">
          </td>
          <td>
            <input type="number" id="pengeluaran4" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

        <tr>
          <td>
            <input type="text" id="ket_pengeluaran5" placeholder="Pengeluaran lainnya">
          </td>
          <td>
            <input type="number" id="pengeluaran5" value="0" oninput="hitungKeuangan()">
          </td>
        </tr>

      </tbody>
    </table>

    <h3>Total Keuangan: Rp <span id="total-keuangan">0</span></h3>
  </div>

  <!-- SISA UANG -->
  <div class="section">
    <h2>Sisa Uang</h2>
    <h1>Rp <span id="sisa-uang">0</span></h1>
  </div>

  <!-- BUTTON -->
  <div class="section tombol">
    <button onclick="simpanSemua()">Simpan Semua</button>
    <button onclick="window.location.href='history.html'">Lihat History</button>
  </div>

</div>

<script>
  document.getElementById("tanggal").valueAsDate = new Date();
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
